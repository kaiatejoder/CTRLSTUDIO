<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login — CTRL Admin</title>
    <link rel="icon" type="image/svg+xml" href="img/favicon.svg" sizes="64x64">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/admin-inline.css">
</head>
<body>

<!-- SIDEBAR -->
<aside class="admin-sidebar">
    <div class="sidebar-logo">
        <img src="img/LOGO.svg" alt="CTRL Studio" style="height: 1.5rem; width: auto;">
        <div class="sidebar-label-admin">Administración</div>
    </div>
    <nav class="sidebar-nav">
        <div class="sidebar-section">Principal</div>
        <a href="dashboard.html" class="sidebar-link">
            <span class="icon">◈</span> Dashboard
        </a>
        <div class="sidebar-section">Gestión</div>
        <a href="usuarios.html" class="sidebar-link">
            <span class="icon">◎</span> Usuarios
        </a>
        <a href="productos.html" class="sidebar-link">
            <span class="icon">◻</span> Productos
        </a>
        <a href="pedidos.html" class="sidebar-link">
            <span class="icon">◑</span> Pedidos
        </a>
        <div class="sidebar-section">Sistema</div>
        <a href="index.html" class="sidebar-link active">
            <span class="icon">←</span> Iniciar sesión
        </a>
    </nav>
    <div class="sidebar-footer">
        <div class="admin-user">
            <div class="admin-avatar">?</div>
            <div>
                <div class="admin-user-name">Invitado</div>
                <div class="admin-user-role">No autenticado</div>
            </div>
        </div>
    </div>
</aside>

<!-- MAIN -->
<main class="admin-main">
    <div class="admin-topbar">
        <span class="topbar-title">Iniciar sesión</span>
        <div class="topbar-right">
            <span style="font-size:0.78rem; color:var(--txt-muted)">Panel de control</span>
        </div>
    </div>

    <div class="admin-content">
        <div class="admin-login-container">
            <div class="admin-login-card form-card">
                <div class="admin-login-header">
                    <div class="admin-login-icon">◆</div>
                    <h3 class="admin-login-title">Acceso Admin</h3>
                    <p class="admin-login-subtitle">Ingresa tus credenciales para continuar</p>
                </div>

                <form id="login-form">
                    <div class="admin-form-group">
                        <label class="admin-form-label" for="usuario">Usuario o Email</label>
                        <input type="text" id="usuario" class="admin-form-input" placeholder="admin@ctrlstudio.es" required>
                    </div>

                    <div class="admin-form-group">
                        <label class="admin-form-label" for="password">Contraseña</label>
                        <input type="password" id="password" class="admin-form-input" placeholder="••••••••" required>
                    </div>

                    <button type="submit" class="admin-submit-btn">INICIAR SESIÓN</button>

                    <div class="admin-login-footer">
                        ¿Olvidaste tu contraseña? <a href="#" class="admin-forgot-password">Recuperar acceso</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/admin.js"></script>
<script>
document.getElementById("login-form").addEventListener("submit", function(e) {
    e.preventDefault();
    const usuario = document.getElementById("usuario").value;
    const password = document.getElementById("password").value;
    
    // Validación simple (en producción usar backend)
    if (usuario === "admin" && password === "admin123") {
        sessionStorage.setItem("ctrl_admin", "true");
        window.location.href = "dashboard.html";
    } else {
        alert("Usuario o contraseña incorrectos");
    }
});

// Si ya está logueado, ir al dashboard
if (sessionStorage.getItem("ctrl_admin") === "true") {
    window.location.href = "dashboard.html";
}
</script>
<script src="js/mis-etiquetas.js"></script>
<script src="js/fondo.js"></script>
</body>
</html>
