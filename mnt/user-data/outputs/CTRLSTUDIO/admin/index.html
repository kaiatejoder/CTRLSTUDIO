<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin — CTRL Studio</title>
    <link rel="icon" type="image/svg+xml" href="img/favicon.svg" sizes="64x64">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--oscuro);
        }
        .login-wrap {
            width: min(100%, 26rem);
            padding: 1rem;
        }
        .login-card {
            background: white;
            border-radius: 1.25rem;
            padding: 2.5rem;
        }
        .login-logo {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            color: var(--oscuro);
            margin-bottom: 0.2rem;
        }
        .login-subtitle {
            font-size: 0.7rem;
            letter-spacing: 0.15em;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--txt-muted);
            margin-bottom: 2rem;
        }
        .login-label {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--txt-muted);
            margin-bottom: 0.4rem;
        }
        .login-input {
            width: 100%;
            border: 1.5px solid var(--gris-mid);
            border-radius: 0.75rem;
            padding: 0.7rem 1rem;
            font-size: 0.9rem;
            font-family: inherit;
            transition: border-color 0.2s;
            outline: none;
            margin-bottom: 1rem;
        }
        .login-input:focus { border-color: var(--azul); box-shadow: 0 0 0 3px rgba(152,159,203,0.2); }
        .login-input:invalid:not(:placeholder-shown) { border-color: var(--rojo); }
        .login-btn {
            width: 100%;
            background: var(--oscuro);
            color: white;
            border: none;
            border-radius: 999rem;
            padding: 0.85rem;
            font-size: 0.82rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            cursor: pointer;
            transition: background 0.2s;
            font-family: inherit;
            margin-top: 0.5rem;
        }
        .login-btn:hover { background: var(--sidebar); }
        .login-note {
            font-size: 0.72rem;
            color: var(--txt-muted);
            text-align: center;
            margin-top: 1.2rem;
        }
        .error-msg {
            background: rgba(165,1,54,0.08);
            border: 1px solid rgba(165,1,54,0.2);
            color: var(--rojo);
            font-size: 0.8rem;
            font-weight: 600;
            padding: 0.6rem 1rem;
            border-radius: 0.6rem;
            margin-bottom: 1rem;
            display: none;
        }
        .bg-grid {
            position: fixed;
            inset: 0;
            z-index: -1;
            background-image: radial-gradient(circle, rgba(255,255,255,0.06) 1px, transparent 1px);
            background-size: 1.5rem 1.5rem;
        }
    </style>
</head>
<body>
<div class="bg-grid"></div>

<div class="login-wrap">
    <div class="login-card">
        <img src="img/LOGO.svg" alt="CTRL Studio" style="height: 1.5rem; width: auto; margin-bottom: 0.2rem; display: block;">
        <div class="login-subtitle">Panel de administración</div>

        <div class="error-msg" id="error-msg">Usuario o contraseña incorrectos</div>

        <form id="form-login" novalidate>
            <label class="login-label" for="admin-user">Usuario</label>
            <input type="text" class="login-input" id="admin-user"
                placeholder="admin" required autocomplete="username">

            <label class="login-label" for="admin-pass">Contraseña</label>
            <input type="password" class="login-input" id="admin-pass"
                placeholder="••••••••" required minlength="6" autocomplete="current-password">

            <button type="submit" class="login-btn">ENTRAR A MANTENIMIENTO</button>
        </form>

        <p class="login-note">No se permite el registro de nuevos administradores.</p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
document.getElementById("form-login").addEventListener("submit", function(e) {
    e.preventDefault();
    const user = document.getElementById("admin-user").value;
    const pass = document.getElementById("admin-pass").value;
    const err = document.getElementById("error-msg");

    // Credenciales de demostración
    if (user === "admin" && pass === "admin123") {
        sessionStorage.setItem("ctrl_admin", "true");
        window.location.href = "dashboard.html";
    } else {
        err.style.display = "block";
        document.getElementById("admin-pass").value = "";
    }
});
</script>
</body>
</html>
